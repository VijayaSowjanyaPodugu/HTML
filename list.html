<!DOCTYPE html>
<html>
<head> 
    <title>List</title>
</head>
<body> 
    <h1>Fruits</h1>

    <ol>
        <li>Apple</li>
        <li>Orange</li>
        <li>Banana</li>
    </ol>

    
    <ol type ="A">
        <li>Apple</li>
        <li>Orange</li>
        <li>Banana</li>
    </ol>
    <ol type ="a">
        <li>Apple</li>
        <li>Orange</li>
        <li>Banana</li>
    </ol>
    <ol type="I">
        <li>Apple</li>
        <li>Orange</li>
        <li>Banana</li>
    </ol>
    <ol type="i">
        <li>Apple</li>
        <li>Orange</li>
        <li>Banana</li>
    </ol>



    <h1>School</h1>

    <ul>
        <li>Bag</li>
        <li>Bench</li>
        <li>Box</li>
    </ul>
    <ul type="square">
        <li>Bag</li>
        <li>Bench</li>
        <li>Box</li>
    </ul>
    
   
</body>
</html>
